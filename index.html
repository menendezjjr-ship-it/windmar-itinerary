<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#1D429B" />
<title>WindMar Itinerary — Dispatch & Field Operations</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  /* ============================================================
     WINDMAR SOLAR + ROOFING — official brand (windmar-branding skill)
     ============================================================ */
  :root{
    --wh-blue:#1D429B; --wh-blue-dark:#21366B; --wh-blue-light:#A6C3E6;
    --wh-orange:#F89B24; --wh-grey:#666666;
    /* JOB CODE color system — DL / RDL / RL / S / MSP */
    --jc-DL:#16A34A;  --jc-DL-d:#0F7A37;     /* Solar / Battery Install — Emerald */
    --jc-RDL:#1D429B; --jc-RDL-d:#14275E;    /* Re-Roof + Solar — WH Blue */
    --jc-RL:#DC2626;  --jc-RL-d:#991B1B;     /* Roofing — Red */
    --jc-S:#F89B24;   --jc-S-d:#B86A0D;      /* Service — Solar Orange */
    --jc-MSP:#7C3AED; --jc-MSP-d:#5B21B6;    /* MSP Upgrade — Violet */
    /* dark surfaces (default) */
    --bg:#0A1126; --bg-2:#101a30; --panel:#152251; --panel-2:#1A2B63;
    --line:#2A3F7A; --text:#E8EEF8; --text-dim:#A6C3E6; --warn:#F87171; --warn-bg:#3A1B22;
    --ok:#28A745;
  }
  [data-theme="light"]{
    --bg:#EEF2F9; --bg-2:#FFFFFF; --panel:#FFFFFF; --panel-2:#F4F6FA;
    --line:#C8D4E8; --text:#0c1322; --text-dim:#4a5a7a; --warn-bg:#FDECEC;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Montserrat',system-ui,-apple-system,Segoe UI,sans-serif;
    background:radial-gradient(1200px 600px at 80% -10%, #18234a 0%, var(--bg) 55%);
    color:var(--text); min-height:100vh; -webkit-font-smoothing:antialiased;
  }
  [data-theme="light"] body{background:radial-gradient(1000px 500px at 80% -10%, #dfe7f5 0%, var(--bg) 55%);}
  /* BOLD 3D "POP" BUTTON */
  .btn3d{font-family:inherit;font-weight:800;font-size:14px;letter-spacing:.4px;text-transform:uppercase;color:#fff;
    background:var(--wh-orange);border:3px solid #0c1322;border-radius:14px;padding:12px 20px;cursor:pointer;user-select:none;position:relative;
    transition:transform .06s ease,box-shadow .06s ease,filter .15s ease;box-shadow:0 6px 0 0 #0c1322,0 10px 14px rgba(0,0,0,.45);}
  .btn3d:hover{filter:brightness(1.08);}
  .btn3d:active{transform:translateY(4px);box-shadow:0 2px 0 0 #0c1322,0 4px 8px rgba(0,0,0,.45);}
  .btn3d.blue{background:var(--wh-blue);}
  .btn3d.green{background:var(--jc-DL);}
  .btn3d.grey{background:#3a4a6e;}
  .btn3d.red{background:var(--jc-RL);}
  .btn3d.ghost{background:transparent;color:var(--wh-blue-light);box-shadow:0 4px 0 0 #0c1322;border-color:#2A3F7A;}
  [data-theme="light"] .btn3d.ghost{color:var(--wh-blue);border-color:var(--line);box-shadow:0 4px 0 0 var(--wh-blue-dark);}
  .btn3d.sm{padding:8px 14px;font-size:12px;border-radius:11px;box-shadow:0 5px 0 0 #0c1322,0 8px 12px rgba(0,0,0,.4);}
  .btn3d.sm:active{box-shadow:0 2px 0 0 #0c1322;}
  .tabbtn{font-family:inherit;font-weight:700;font-size:14px;background:transparent;color:var(--text-dim);border:none;
    padding:15px 18px;cursor:pointer;white-space:nowrap;border-bottom:4px solid transparent;transition:color .15s;}
  .tabbtn:hover{color:var(--text);}
  .tabbtn.active{color:var(--text);border-bottom-color:var(--wh-orange);}
  .card{background:linear-gradient(180deg,var(--panel) 0%,var(--bg-2) 100%);border:1px solid var(--line);border-radius:18px;box-shadow:0 10px 30px rgba(0,0,0,.35);}
  [data-theme="light"] .card{background:var(--panel);box-shadow:0 4px 16px rgba(29,66,155,.10);}
  .jobchip{border-radius:14px;padding:12px 14px;color:#fff;cursor:pointer;border:2px solid rgba(0,0,0,.25);
    box-shadow:0 4px 0 0 rgba(0,0,0,.30),0 6px 12px rgba(0,0,0,.30);transition:transform .08s ease,box-shadow .08s ease;}
  .jobchip:hover{transform:translateY(-2px);}
  .jobchip:active{transform:translateY(2px);box-shadow:0 2px 0 0 rgba(0,0,0,.30);}
  .pill{font-size:11px;font-weight:800;padding:3px 9px;border-radius:999px;text-transform:uppercase;letter-spacing:.5px;display:inline-block;color:#fff;}
  .input,select.input{background:var(--bg);border:2px solid var(--line);border-radius:12px;color:var(--text);padding:11px 14px;font-family:inherit;font-size:14px;width:100%;outline:none;}
  .input:focus{border-color:var(--wh-orange);}
  .label{font-size:12px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;display:block;}
  .scroll::-webkit-scrollbar{height:10px;width:10px;}
  .scroll::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px;}
  .codebox{background:#06091a;border:1px solid var(--line);border-radius:12px;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12.5px;line-height:1.6;color:#c9d8ff;padding:16px;overflow:auto;white-space:pre;}
  .fade{animation:fade .25s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
  .weatherAlert{background:var(--warn-bg);border:2px solid var(--warn);border-radius:12px;}
  table{border-collapse:collapse;}
  .logoPlate{background:#fff;border-radius:12px;padding:6px 12px;display:inline-flex;align-items:center;box-shadow:0 4px 0 var(--wh-blue-dark);}
  .logoPlate img{display:block;height:34px;}
  /* radar */
  .radar{position:relative;height:260px;border-radius:16px;overflow:hidden;background:
    radial-gradient(circle at 50% 55%, #0c2a1e 0%, #0a1a3a 70%);border:1px solid var(--line);}
  .radar::before{content:"";position:absolute;inset:0;background:
    repeating-radial-gradient(circle at 50% 55%, rgba(166,195,230,.10) 0 1px, transparent 1px 34px);}
  .sweep{position:absolute;left:50%;top:55%;width:46%;height:3px;transform-origin:left center;
    background:linear-gradient(90deg,rgba(80,220,140,.9),transparent);animation:spin 4s linear infinite;}
  @keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
  .blip{position:absolute;border-radius:50%;background:rgba(80,220,140,.55);filter:blur(1px);}
.leaflet-tooltip{background:#16223A;color:#cfe0ff;border:1px solid #2A3F7A;font-family:inherit;font-weight:700;font-size:11px;}
  .leaflet-tooltip-top:before{border-top-color:#2A3F7A;}
  #crewMap{background:#0a1a3a;}
  .distlbl{background:#16223A!important;color:#A6C3E6!important;border-color:#2A3F7A!important;}
</style>
</head>

const ZOHO = { base: process.env.ZOHO_API_DOMAIN, accounts: process.env.ZOHO_ACCOUNTS_URL };
async function getAccessToken(){                          // cache ~55 min

export async function POST(req){
  const sig = req.headers.get("x-zoho-signature");
  if(!verifyHmac(sig, await req.clone().text(), process.env.ZOHO_WEBHOOK_SECRET))
    return Response.json({ error:"unauthorized" }, { status:401 });
  const { data } = await req.json();

    await db.jobs.upsert({ where:{id:job.id}, update:job, create:job });

/* ---- geo: haversine miles ---- */
function miles(a,b){
  const R=3958.8, dLat=(b.lat-a.lat)*Math.PI/180, dLon=(b.lon-a.lon)*Math.PI/180;
  const s=Math.sin(dLat/2)**2 + Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(s),Math.sqrt(1-s));
}

/* ============================================================================
   WEATHER — real Open-Meteo (7-day, no key) + deterministic mock fallback
   ============================================================================ */
async function fetchForecast(lat,lon){
  const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}`
    +`&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,wind_speed_10m_max,weather_code`
    +`&temperature_unit=fahrenheit&wind_speed_unit=mph&timezone=auto&forecast_days=7`;
  const r=await fetch(url); if(!r.ok) throw new Error("network");
  const d=await r.json();
  return d.daily.time.map((day,i)=>({date:day,high:Math.round(d.daily.temperature_2m_max[i]),low:Math.round(d.daily.temperature_2m_min[i]),
    precip:d.daily.precipitation_probability_max[i],wind:Math.round(d.daily.wind_speed_10m_max[i]),code:d.daily.weather_code[i]}));
}
function mockWeek(seed){
  const arr=[];for(let i=0;i<7;i++){const s=(seed+i*13)%100;
    arr.push({date:dShift(i),high:86+(s%9),low:71+(s%5),precip:(s*7)%95,wind:7+(s%24),code:s%3?1:61});}
  return arr;
}
function wxIcon(c,precip,wind){ if(wind>=25)return"💨"; if(precip>=60||c>=61)return"🌧️"; if(c>=2)return"⛅"; return"☀️"; }
function deriveAlerts(fc){const a=[];
  if(fc.wind>=25)a.push({key:"wx_wind",detail:"wx_wind_detail",icon:"💨"});
  if(fc.precip>=60)a.push({key:"wx_rain",detail:"wx_rain_detail",icon:"🌧️"});
  if(fc.high>=95)a.push({key:"wx_heat",detail:"wx_heat_detail",icon:"🔥"});
  return a;}
function siteToday(job){ const w=S.wx.data[job.id]; return (w&&w[0]) || mockWeek(Math.abs(Math.round((job.geo.lat+job.geo.lon)*1000))%100)[0]; }
async function loadWeather(){
  const todays=JOBS.filter(j=>j.date===todayISO);
  todays.forEach(j=>{ if(!S.wx.data[j.id]) S.wx.data[j.id]=mockWeek(Math.abs(Math.round((j.geo.lat+j.geo.lon)*1000))%100); });
  render();
  try{
    const res={};
    await Promise.all(todays.map(async j=>{ try{res[j.id]=await fetchForecast(j.geo.lat,j.geo.lon);}catch(e){res[j.id]=S.wx.data[j.id];} }));
    S.wx.data=res; S.wx.live=true;
  }catch(e){ S.wx.live=false; }
  render();
}

const PHRASES=[["Power is off","La energía está apagada"],["Danger: High voltage","Peligro: Voltaje Alto"],

  ["Call for help","Llamar a ayuda"],["Safety first","La seguridad es primero"]];
const LOTO_EN=["Notify crew & customer","Identify all energy sources","Open the AC/PV disconnects","Open the main breaker",
  "Apply lock + tag (one per worker)","Verify zero voltage with a meter","Discharge stored energy (caps/battery)","Test the meter on a known source again"];

  "Aplicar candado + etiqueta (uno por trabajador)","Verificar voltaje cero con multímetro","Descargar energía almacenada (capacitores/batería)","Volver a probar el multímetro en fuente conocida"];

      <div style="font-size:11px;color:${fc.precip>=60?'var(--warn)':'var(--text-dim)'};margin-top:4px">💧${fc.precip}%</div>
      <div style="font-size:11px;color:${fc.wind>=25?'var(--warn)':'var(--text-dim)'}">💨${fc.wind}</div></div>`;

  const phrasesRows=PHRASES.map(p=>`<tr style="border-top:1px solid var(--line)"><td style="padding:7px 10px">${p[0]}</td><td style="padding:7px 10px;color:var(--wh-blue-light)">${p[1]}</td></tr>`).join("");
  const loto=(S.lang==="en"?LOTO_EN:LOTO_ES).map((s,i)=>`<li style="margin:3px 0">${esc(s)}</li>`).join("");
  const rules=(S.lang==="en"?WX_RULES_EN:WX_RULES_ES).map(s=>`<li style="margin:3px 0">${esc(s)}</li>`).join("");

      <div><h2 style="margin:0 0 4px;font-size:24px">${t("wx_title")} <span class="pill" style="background:${S.wx.live?'var(--jc-DL)':'var(--wh-grey)'};font-size:10px;vertical-align:middle">${S.wx.live?t("wx_live"):t("wx_mock")}</span></h2>
      <div style="color:var(--text-dim);max-width:600px">${t("wx_sub")}</div></div>
      <button class="btn3d sm" data-action="wxRefresh">⟳ ${t("wx_refresh")}</button></div>

      <div style="position:absolute;left:12px;bottom:10px;font-size:11px;color:var(--text-dim)">${t("wx_radarNote")}</div></div>
    <div class="label" style="margin-top:18px">⚠ ${t("wx_alerts")}: ${allAlerts.length}</div>
    <div style="display:flex;flex-direction:column;gap:10px">${alertBlock}</div>
    <div class="label" style="margin-top:18px">${t("wx_7day")}</div>
    <div class="scroll" style="display:flex;gap:10px;overflow-x:auto;padding-bottom:6px">${days7}</div>
    <div class="label" style="margin-top:18px">🦺 ${t("wx_safety")}</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px">
      <div class="card" style="padding:16px"><div style="font-weight:800;margin-bottom:6px">🔒 ${t("wx_loto")}</div><ol style="margin:0;padding-left:18px;font-size:13px">${loto}</ol></div>
      <div class="card" style="padding:16px"><div style="font-weight:800;margin-bottom:6px">🌪 ${t("wx_rules")}</div><ul style="margin:0;padding-left:18px;font-size:13px">${rules}</ul></div>
      <div class="card" style="padding:16px"><div style="font-weight:800;margin-bottom:6px">🗣 ${t("wx_phrases")}</div>

const TABS=[

function initCrewMap(){
  if(typeof L==="undefined") return;
  const el=document.getElementById("crewMap"); if(!el) return;
  if(window._cm){ try{window._cm.remove();}catch(e){} window._cm=null; }
  const m=L.map(el).setView([28.45,-81.4],8); window._cm=m;
  L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",{maxZoom:19,attribution:"© CARTO"}).addTo(m);
  const pts=[];
  L.circleMarker([HQ.lat,HQ.lon],{radius:6,color:"#fff",weight:2,fillColor:"#666",fillOpacity:1}).addTo(m).bindTooltip("🏢 "+HQ.name,{direction:"top"});
  pts.push([HQ.lat,HQ.lon]);
  CREWS.forEach(c=>{
    L.circleMarker([c.gps.lat,c.gps.lon],{radius:9,color:"#0a0a0a",weight:2,fillColor:c.color,fillOpacity:1}).addTo(m)
      .bindTooltip(c.type+" ("+c.lead+")"+(c.mph>0?" · "+c.mph+" mph":" · idle"),{direction:"top"});
    pts.push([c.gps.lat,c.gps.lon]);
  });
  if(S.crews.showDist){
    CREWS.forEach(c=>{ const n=nearestOther(c); if(n.crew){
      L.polyline([[c.gps.lat,c.gps.lon],[n.crew.gps.lat,n.crew.gps.lon]],{color:"#A6C3E6",weight:1,dashArray:"4 6",opacity:.45}).addTo(m)
        .bindTooltip(n.d.toFixed(1)+" mi",{permanent:true,direction:"center",className:"distlbl"});
    }});
  }
  const dr=S.crews.dispatchResult;
  if(dr&&dr.target&&dr.crew){
    L.circleMarker([dr.target.lat,dr.target.lon],{radius:8,color:"#fff",weight:2,fillColor:"#F89B24",fillOpacity:1}).addTo(m).bindTooltip("🎯 "+dr.target.label,{direction:"top"});
    L.polyline([[dr.target.lat,dr.target.lon],[dr.crew.gps.lat,dr.crew.gps.lon]],{color:"#F89B24",weight:3,opacity:.9}).addTo(m);
    pts.push([dr.target.lat,dr.target.lon]);
  }
  if(pts.length>1){ try{ m.fitBounds(pts,{padding:[40,40]}); }catch(e){} }
  setTimeout(function(){ try{m.invalidateSize();}catch(e){} },140);
}
function render(){
  document.documentElement.setAttribute("data-theme",S.theme);
  const ae=document.activeElement, aeId=ae&&ae.id, caret=ae&&ae.selectionStart;
  const active=TABS.find(x=>x.id===S.tab);
  document.getElementById("root").innerHTML=`
    <header style="border-bottom:3px solid var(--wh-orange);background:var(--wh-blue)">
      <div style="max-width:1180px;margin:0 auto;padding:12px 20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap">
        <div class="logoPlate"><img src="data:image/png;base64,${LOGO_B64}" alt="WindMar Solar+Roofing"/></div>
        <div><div style="font-weight:900;font-size:18px;color:#fff">WindMar <span style="color:#FFD9A8">${t("appName")}</span></div>
          <div style="font-size:11px;color:#cfe0ff;font-weight:600;text-transform:uppercase;letter-spacing:1px">${t("appTagline")}</div></div>
        <div style="margin-left:auto;display:flex;align-items:center;gap:8px">
          <button class="btn3d ghost sm" data-action="toggleLang" style="color:#fff;border-color:#0c1322">🌐 ${t("lang")}</button>
          <button class="btn3d ghost sm" data-action="toggleTheme" style="color:#fff;border-color:#0c1322">${S.theme==="dark"?"☀":"🌙"}</button></div>
      </div></header>
    <nav style="border-bottom:1px solid var(--line);background:var(--bg-2);position:sticky;top:0;z-index:5">
      <div class="scroll" style="max-width:1180px;margin:0 auto;padding:0 12px;display:flex;overflow-x:auto">
        ${TABS.map(tb=>`<button class="tabbtn ${S.tab===tb.id?'active':''}" data-action="setTab" data-id="${tb.id}">${t(tb.key)}</button>`).join("")}
      </div></nav>
    <main style="max-width:1180px;margin:0 auto;padding:22px 20px 70px">${active.fn()}</main>`;
  if(aeId){const el=document.getElementById(aeId);if(el){el.focus();if(caret!=null&&el.setSelectionRange){try{el.setSelectionRange(caret,caret);}catch(e){}}}}
  if(S.tab==="crews") setTimeout(initCrewMap,0);
}

/* ---------- EVENTS ---------- */
const getJob=id=>JOBS.find(j=>j.id===id);
document.addEventListener("click",e=>{
  const el=e.target.closest("[data-action]"); if(!el) return;
  const a=el.getAttribute("data-action"), id=el.getAttribute("data-id");
  if(el.tagName==="SELECT"||el.tagName==="OPTION") return;
  switch(a){
    case "toggleLang": S.lang=S.lang==="en"?"es":"en"; render(); break;
    case "toggleTheme": S.theme=S.theme==="dark"?"light":"dark"; render(); break;
    case "setTab": S.tab=id; if(id==="weather"&&!S.wx.live) loadWeather(); render(); break;
    case "dayPrev": S.dayOffset--; S.selectedJob=null; render(); break;
    case "dayToday": S.dayOffset=0; S.selectedJob=null; render(); break;
    case "dayNext": S.dayOffset++; S.selectedJob=null; render(); break;
    case "selectJob": S.selectedJob=id; render(); break;
    case "closeJob": S.selectedJob=null; render(); break;
    case "advanceStatus": { const j=getJob(id); const i=STATUS_ORDER.indexOf(j.status); j.status=STATUS_ORDER[Math.min(i+1,3)]; render(); break; }
    case "navigate": { const j=getJob(id); window.open("https://maps.google.com/?q="+j.geo.lat+","+j.geo.lon,"_blank"); break; }
    case "call": { const j=getJob(id); window.open("tel:"+j.phone); break; }
    case "callCrew": { const c=CREWS.find(x=>x.id===id); if(c) window.open("tel:"+c.phone); break; }
    case "viewProject": S.tab="sitecapture"; S.sc.q=id; render(); break;
    case "crewToggleDist": S.crews.showDist=!S.crews.showDist; render(); break;
    case "crewFit": render(); break;
    case "crewRefresh": { const now=new Date(); CREWS.forEach((c,i)=>{ c.ping=new Date(now.getTime()-i*15000).toLocaleTimeString(); if(c.mph>0){ c.gps={lat:c.gps.lat+(Math.random()-0.5)*0.02,lon:c.gps.lon+(Math.random()-0.5)*0.02}; c.mph=Math.max(15,Math.round(c.mph+(Math.random()-0.5)*10)); } }); render(); break; }
    case "crewCalc": { const inp=document.getElementById("dispatchTarget"); const raw=(inp?inp.value:"").trim(); const q=raw.toLowerCase(); S.crews.q=raw; let target=null,label=""; if(q){ const job=JOBS.find(j=>j.id.toLowerCase()===q); if(job){ target={lat:job.geo.lat,lon:job.geo.lon}; label=job.id+" · "+job.project; } else { for(const k in FL_CITIES){ if(q.indexOf(k)>=0){ target=FL_CITIES[k]; label=raw; break; } } } } if(target){ let best=null,bd=Infinity; CREWS.forEach(c=>{const d=miles(c.gps,target); if(d<bd){bd=d;best=c;}}); S.crews.dispatchResult={target:{lat:target.lat,lon:target.lon,label:label||raw},crew:best,d:bd}; } else { S.crews.dispatchResult={error:true,q:raw}; } render(); break; }
    case "zohoSync": S.zoho.syncing=true; render(); setTimeout(function(){S.zoho.syncing=false;S.zoho.lastSync=new Date();render();},1300); break;
    case "zohoToggleCode": S.zoho.showCode=!S.zoho.showCode; render(); break;
    case "wxRefresh": S.wx.live=false; S.wx.data={}; loadWeather(); break;
    case "scSelectProject": S.sc.project=id; S.sc.done=false; render(); break;
    case "scSetCat": S.sc.cat=id; render(); break;
    case "scAddDemo": S.sc.queue.push({name:"IMG_"+(1000+S.sc.queue.length)+".jpg",size:(1800+S.sc.queue.length*40)+" KB",cat:S.sc.cat}); S.sc.done=false; render(); break;
    case "scRemove": S.sc.queue.splice(Number(id),1); render(); break;
    case "scUpload":
      if(!S.sc.project||S.sc.queue.length===0) return;
      S.sc.uploading=true; S.sc.done=false; render();
      setTimeout(function(){S.sc.uploading=false;S.sc.done=true;S.sc.queue=[];render();},1400); break;
    case "scCreateJob": {
      const nf=S.sc.nf; if(!nf.project.trim()||!nf.address.trim()) return;
      const seq=2000+JOBS.length+Math.floor(Math.random()*900);
      const newId=nf.code+seq;
      const newJob={id:newId,project:nf.project.trim(),code:nf.code,crew:nf.crew,date:nf.date,window:nf.window,
        address:nf.address.trim(),phone:"863-555-0000",geo:{lat:28.03+Math.random()*0.05,lon:-81.80-Math.random()*0.18},status:"scheduled",scope:"New job (created in field)"};
      JOBS.push(newJob);
      PROJECT_HISTORY.unshift({id:newId,customer:nf.project.trim(),address:nf.address.trim(),code:nf.code,photos:0});
      S.sc.created=newId; S.sc.project=newId;
      S.sc.nf={code:"DL",project:"",crew:"crew-morales",date:todayISO,address:"",window:"8:00 AM – 12:00 PM"};
      render(); break;
    }
  }
});
document.addEventListener("input",function(e){
  if(e.target.id==="scSearch"){ S.sc.q=e.target.value; render(); }
  else if(e.target.hasAttribute&&e.target.hasAttribute("data-nf")){ S.sc.nf[e.target.getAttribute("data-nf")]=e.target.value; S.sc.created=null; render(); }
});
document.addEventListener("change",function(e){
  if(e.target.id==="scFile"&&e.target.files.length){
    Array.from(e.target.files).forEach(function(f){S.sc.queue.push({name:f.name,size:(f.size/1024).toFixed(0)+" KB",cat:S.sc.cat});});
    S.sc.done=false; render();
  }
  else if(e.target.hasAttribute&&e.target.hasAttribute("data-nf")){ S.sc.nf[e.target.getAttribute("data-nf")]=e.target.value; render(); }
});
render();
</script>
</body>
</html>
