<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#1D429B" />
<title>WindMar Itinerary — Dispatch & Field Operations</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  /* ============================================================
     WINDMAR SOLAR + ROOFING — official brand (windmar-branding skill)
     ============================================================ */
  :root{
    --wh-blue:#1D429B; --wh-blue-dark:#21366B; --wh-blue-light:#A6C3E6;
    --wh-orange:#F89B24; --wh-grey:#666666;
    /* JOB CODE color system — DL / RDL / RL / S / MSP */
    --jc-DL:#16A34A;  --jc-DL-d:#0F7A37;     /* Solar / Battery Install — Emerald */
    --jc-RDL:#1D429B; --jc-RDL-d:#14275E;    /* Re-Roof + Solar — WH Blue */
    --jc-RL:#DC2626;  --jc-RL-d:#991B1B;     /* Roofing — Red */
    --jc-S:#F89B24;   --jc-S-d:#B86A0D;      /* Service — Solar Orange */
    --jc-MSP:#7C3AED; --jc-MSP-d:#5B21B6;    /* MSP Upgrade — Violet */
    /* dark surfaces (default) */
    --bg:#0A1126; --bg-2:#101a30; --panel:#152251; --panel-2:#1A2B63;
    --line:#2A3F7A; --text:#E8EEF8; --text-dim:#A6C3E6; --warn:#F87171; --warn-bg:#3A1B22;
    --ok:#28A745;
  }
  [data-theme="light"]{
    --bg:#EEF2F9; --bg-2:#FFFFFF; --panel:#FFFFFF; --panel-2:#F4F6FA;
    --line:#C8D4E8; --text:#0c1322; --text-dim:#4a5a7a; --warn-bg:#FDECEC;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Montserrat',system-ui,-apple-system,Segoe UI,sans-serif;
    background:radial-gradient(1200px 600px at 80% -10%, #18234a 0%, var(--bg) 55%);
    color:var(--text); min-height:100vh; -webkit-font-smoothing:antialiased;
  }
  [data-theme="light"] body{background:radial-gradient(1000px 500px at 80% -10%, #dfe7f5 0%, var(--bg) 55%);}
  /* BOLD 3D "POP" BUTTON */
  .btn3d{font-family:inherit;font-weight:800;font-size:14px;letter-spacing:.4px;text-transform:uppercase;color:#fff;
    background:var(--wh-orange);border:3px solid #0c1322;border-radius:14px;padding:12px 20px;cursor:pointer;user-select:none;position:relative;
    transition:transform .06s ease,box-shadow .06s ease,filter .15s ease;box-shadow:0 6px 0 0 #0c1322,0 10px 14px rgba(0,0,0,.45);}
  .btn3d:hover{filter:brightness(1.08);}
  .btn3d:active{transform:translateY(4px);box-shadow:0 2px 0 0 #0c1322,0 4px 8px rgba(0,0,0,.45);}
  .btn3d.blue{background:var(--wh-blue);}
  .btn3d.green{background:var(--jc-DL);}
  .btn3d.grey{background:#3a4a6e;}
  .btn3d.red{background:var(--jc-RL);}
  .btn3d.ghost{background:transparent;color:var(--wh-blue-light);box-shadow:0 4px 0 0 #0c1322;border-color:#2A3F7A;}
  [data-theme="light"] .btn3d.ghost{color:var(--wh-blue);border-color:var(--line);box-shadow:0 4px 0 0 var(--wh-blue-dark);}
  .btn3d.sm{padding:8px 14px;font-size:12px;border-radius:11px;box-shadow:0 5px 0 0 #0c1322,0 8px 12px rgba(0,0,0,.4);}
  .btn3d.sm:active{box-shadow:0 2px 0 0 #0c1322;}
  .tabbtn{font-family:inherit;font-weight:700;font-size:14px;background:transparent;color:var(--text-dim);border:none;
    padding:15px 18px;cursor:pointer;white-space:nowrap;border-bottom:4px solid transparent;transition:color .15s;}
  .tabbtn:hover{color:var(--text);}
  .tabbtn.active{color:var(--text);border-bottom-color:var(--wh-orange);}
  .card{background:linear-gradient(180deg,var(--panel) 0%,var(--bg-2) 100%);border:1px solid var(--line);border-radius:18px;box-shadow:0 10px 30px rgba(0,0,0,.35);}
  [data-theme="light"] .card{background:var(--panel);box-shadow:0 4px 16px rgba(29,66,155,.10);}
  .jobchip{border-radius:14px;padding:12px 14px;color:#fff;cursor:pointer;border:2px solid rgba(0,0,0,.25);
    box-shadow:0 4px 0 0 rgba(0,0,0,.30),0 6px 12px rgba(0,0,0,.30);transition:transform .08s ease,box-shadow .08s ease;}
  .jobchip:hover{transform:translateY(-2px);}
  .jobchip:active{transform:translateY(2px);box-shadow:0 2px 0 0 rgba(0,0,0,.30);}
  .pill{font-size:11px;font-weight:800;padding:3px 9px;border-radius:999px;text-transform:uppercase;letter-spacing:.5px;display:inline-block;color:#fff;}
  .input,select.input{background:var(--bg);border:2px solid var(--line);border-radius:12px;color:var(--text);padding:11px 14px;font-family:inherit;font-size:14px;width:100%;outline:none;}
  .input:focus{border-color:var(--wh-orange);}
  .label{font-size:12px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;display:block;}
  .scroll::-webkit-scrollbar{height:10px;width:10px;}
  .scroll::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px;}
  .codebox{background:#06091a;border:1px solid var(--line);border-radius:12px;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12.5px;line-height:1.6;color:#c9d8ff;padding:16px;overflow:auto;white-space:pre;}
  .fade{animation:fade .25s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
  .weatherAlert{background:var(--warn-bg);border:2px solid var(--warn);border-radius:12px;}
  table{border-collapse:collapse;}
  .logoPlate{background:#fff;border-radius:12px;padding:6px 12px;display:inline-flex;align-items:center;box-shadow:0 4px 0 var(--wh-blue-dark);}
  .logoPlate img{display:block;height:34px;}
  /* radar */
  .radar{position:relative;height:260px;border-radius:16px;overflow:hidden;background:
    radial-gradient(circle at 50% 55%, #0c2a1e 0%, #0a1a3a 70%);border:1px solid var(--line);}
  .radar::before{content:"";position:absolute;inset:0;background:
    repeating-radial-gradient(circle at 50% 55%, rgba(166,195,230,.10) 0 1px, transparent 1px 34px);}
  .sweep{position:absolute;left:50%;top:55%;width:46%;height:3px;transform-origin:left center;
    background:linear-gradient(90deg,rgba(80,220,140,.9),transparent);animation:spin 4s linear infinite;}
  @keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
  .blip{position:absolute;border-radius:50%;background:rgba(80,220,140,.55);filter:blur(1px);}
.leaflet-tooltip{background:#16223A;color:#cfe0ff;border:1px solid #2A3F7A;font-family:inherit;font-weight:700;font-size:11px;}
  .leaflet-tooltip-top:before{border-top-color:#2A3F7A;}
  #crewMap{background:#aadaff;}
  .leaflet-interactive{filter:drop-shadow(0 1px 3px rgba(0,0,0,.35));}
  .leaflet-bar a{border-radius:6px!important;}
  .leaflet-container{font-family:inherit;}
  .distlbl{background:#16223A!important;color:#A6C3E6!important;border-color:#2A3F7A!important;}
  .calchip{font-size:11px;font-weight:800;color:#fff;border-radius:7px;padding:3px 8px;white-space:nowrap;box-shadow:0 1px 2px rgba(0,0,0,.35);border-top:1px solid rgba(255,255,255,.28);letter-spacing:.2px;}
  .calrow{transition:transform .1s ease, box-shadow .1s ease;}
  .calrow:hover{transform:translateY(-2px);box-shadow:0 12px 26px rgba(0,0,0,.42);}
  .statpill{font-size:10.5px;font-weight:800;padding:2px 8px;border-radius:999px;white-space:nowrap;}
  /* ───────── Motion & interactivity layer ───────── */
  html{scroll-behavior:smooth;}
  @media (prefers-reduced-motion:no-preference){
    @keyframes rise{from{opacity:0;transform:translateY(14px) scale(.985);}to{opacity:1;transform:none;}}
    @keyframes popIn{0%{opacity:0;transform:scale(.92);}60%{transform:scale(1.02);}100%{opacity:1;transform:none;}}
    .rise{animation:rise .42s cubic-bezier(.22,1,.36,1) both;}
    .stagger>*{animation:rise .5s cubic-bezier(.22,1,.36,1) both;}
    .stagger>*:nth-child(1){animation-delay:.03s}.stagger>*:nth-child(2){animation-delay:.07s}
    .stagger>*:nth-child(3){animation-delay:.11s}.stagger>*:nth-child(4){animation-delay:.15s}
    .stagger>*:nth-child(5){animation-delay:.19s}.stagger>*:nth-child(6){animation-delay:.23s}
    .stagger>*:nth-child(7){animation-delay:.27s}.stagger>*:nth-child(8){animation-delay:.31s}
    .stagger>*:nth-child(n+9){animation-delay:.35s}
    .tabbtn.active{animation:popIn .3s ease;}
  }
  /* tactile, obviously-clickable cards */
  .card{transition:transform .16s cubic-bezier(.22,1,.36,1),box-shadow .16s ease,border-color .16s ease;}
  .card.tap{cursor:pointer;}
  .card.tap:hover{transform:translateY(-4px);box-shadow:0 18px 40px rgba(0,0,0,.46);border-color:var(--wh-blue);}
  .card.tap:active{transform:translateY(-1px) scale(.995);}
  .jobchip:hover{transform:translateY(-3px) scale(1.01);box-shadow:0 9px 0 -4px rgba(0,0,0,.25),0 14px 22px rgba(0,0,0,.4);}
  /* live status dot pulse */
  @keyframes livepulse{0%{box-shadow:0 0 0 0 rgba(40,167,69,.55);}70%{box-shadow:0 0 0 9px rgba(40,167,69,0);}100%{box-shadow:0 0 0 0 rgba(40,167,69,0);}}
  .livedot{display:inline-block;width:9px;height:9px;border-radius:50%;background:var(--ok);animation:livepulse 1.8s infinite;vertical-align:middle;}
  /* stage chips scroller hides scrollbar for a cleaner look */
  .chipbar::-webkit-scrollbar{height:0;}
</style>
</head>

const ZOHO = { base: process.env.ZOHO_API_DOMAIN, accounts: process.env.ZOHO_ACCOUNTS_URL };
async function getAccessToken(){                          // cache ~55 min

export async function POST(req){
  const sig = req.headers.get("x-zoho-signature");
  if(!verifyHmac(sig, await req.clone().text(), process.env.ZOHO_WEBHOOK_SECRET))
    return Response.json({ error:"unauthorized" }, { status:401 });
  const { data } = await req.json();
  for(const rec of data){ const job = zohoToJob(rec);
    await db.jobs.upsert({ where:{id:job.id}, update:job, create:job });
    await broadcast("job:update", job); }                 // live push via SSE/WebSocket
  return Response.json({ ok:true });
}`;

/* ---- geo: haversine miles ---- */
function miles(a,b){
  const R=3958.8, dLat=(b.lat-a.lat)*Math.PI/180, dLon=(b.lon-a.lon)*Math.PI/180;
  const s=Math.sin(dLat/2)**2 + Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(s),Math.sqrt(1-s));
}

async function loadOpsCal(){

  try{
    const r=await fetch("/api/zoho-jobs?from="+from+"&to="+to,{cache:"no-store"});
    const j=await r.json();
    if(j&&j.ok&&Array.isArray(j.jobs)){ S.cal.records=j.jobs.map(calRec); S.cal.status="live"; }

function notifyProjects(projects){

}

function checkEngineering(projects){
  const engIds=projects.filter(p=>p.stage==="Engineering").map(p=>p.id);
  let seen=null; try{ seen=JSON.parse(localStorage.getItem("wm_eng_seen")||"null"); }catch(e){}
  if(!Array.isArray(seen)){ try{ localStorage.setItem("wm_eng_seen",JSON.stringify(engIds)); }catch(e){} return; }
  const seenSet=new Set(seen);
  const fresh=projects.filter(p=>p.stage==="Engineering"&&!seenSet.has(p.id));
  if(fresh.length){
    S.proj.alerts=fresh.map(p=>({id:p.id,num:p.num,name:p.name,phone:p.mobile||p.phone}));
    if(S.proj.notify&&("Notification"in window)&&Notification.permission==="granted"){

    }
  }
  try{ localStorage.setItem("wm_eng_seen",JSON.stringify(engIds)); }catch(e){}
}

function activeSource(){ return (S.crews.fleet && S.crews.fleet.length) ? S.crews.fleet : CREWS; }

function nearestOther(c){ const src=activeSource(); let best=null,bd=Infinity; src.forEach(o=>{ if(o.id===c.id||!o.gps)return; const d=miles(c.gps,o.gps); if(d<bd){bd=d;best=o;} }); return {crew:best,d:bd}; }
async function loadFleet(){
  try{
    const r=await fetch("/api/crews",{cache:"no-store"});
    const j=await r.json();
    if(j&&j.configured&&j.ok&&j.crews&&j.crews.length){
      const pal=["#3B82F6","#F89B24","#16A34A","#06B6D4","#A855F7","#EC4899","#DC2626","#10B981","#EAB308","#14B8A6"];
      const norm=x=>(x||"").toUpperCase().replace(/\s+/g," ").trim();
      const ALLOW=["SITE SURVEY (CODY JONES)","ROOFING (PEDRO SANCHEZ RAMIREZ)","SERVICE (LUIS MORALES)","SERVICE (LUIS ORTIZ RODRIGUEZ)","SERVICE (DAVID RADKE)","IN HOUSE 2 (TAILOR HERRERA)","INSTALACION (CARLOS ACEVEDO)","IN HOUSE 3 (WILLIAM SIERRA)","ROOFING (ROBERT RUIZ)","SITE SURVEY (DANIEL LAIZ)","SERVICE (JOALISMAR WILLIM)","INSTALACION (LEONARDO TORRES)"].map(norm);
      const mapped=j.crews.map((v,i)=>({id:"veh-"+v.id,name:v.name,type:null,lead:v.name,color:pal[i%pal.length],
        gps:v.gps,mph:v.mph||0,addr:v.addr||"—",precision:v.addr?"GEOCODED":"APPROX",
        ping:v.time?new Date(v.time).toLocaleTimeString():"—"}));
      let filt=mapped.filter(c=>ALLOW.indexOf(norm(c.name))>=0);
      if(!filt.length) filt=mapped.filter(c=>/^(SERVICE|ROOFING|SITE SURVEY|INSTALACION|IN HOUSE)\b/.test(norm(c.name)));
      // keep the allowlist display order
      filt.sort((a,b)=>ALLOW.indexOf(norm(a.name))-ALLOW.indexOf(norm(b.name)));
      S.crews.fleet=filt;
      S.crews.fleetState="live";
    } else if(j&&j.configured){ S.crews.fleet=[]; S.crews.fleetState="error"; }
    else { S.crews.fleet=[]; S.crews.fleetState="sample"; }
  }catch(e){ S.crews.fleet=[]; S.crews.fleetState="sample"; }
  render();
}

/* ---------- TAB: SITECAPTURE (live SiteCapture: search + create + view) ---------- */
async function loadSiteCapture(q){
  S.sc.scState="loading"; render();
  try{
    const r=await fetch("/api/sitecapture?q="+encodeURIComponent(q||""),{cache:"no-store"});
    const j=await r.json();
    if(j&&j.configured&&j.ok){ S.sc.results=j.projects||[]; S.sc.templates=j.templates||[]; S.sc.canCreate=!!j.canCreate; S.sc.scState="live"; }
    else if(j&&j.configured){ S.sc.results=[]; S.sc.scState="error"; S.sc.err=j.error||("HTTP "+j.status); }
    else { S.sc.results=[]; S.sc.scState="sample"; }
  }catch(e){ S.sc.results=[]; S.sc.scState="sample"; }
  render();
}

  if(st.indexOf("PROGRESS")>=0)return"#06B6D4";
  if(st.indexOf("NEW")>=0)return"var(--wh-blue)";
  return"var(--wh-grey)"; }

function initCrewMap(){
  if(typeof L==="undefined") return;
  const el=document.getElementById("crewMap"); if(!el) return;
  if(window._cm){ try{window._cm.remove();}catch(e){} window._cm=null; }
  const src=activeSource();
  const m=L.map(el).setView([28.45,-81.4],8); window._cm=m;
  L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png",{maxZoom:19,attribution:"© CARTO"}).addTo(m);
  const pts=[];
  L.circleMarker([HQ.lat,HQ.lon],{radius:7,color:"#fff",weight:3,fillColor:"#1D429B",fillOpacity:1}).addTo(m).bindTooltip("🏢 "+HQ.name,{direction:"top"});
  pts.push([HQ.lat,HQ.lon]);
  src.forEach(c=>{ if(!c.gps)return;
    L.circleMarker([c.gps.lat,c.gps.lon],{radius:10,color:"#ffffff",weight:3,fillColor:c.color,fillOpacity:1}).addTo(m)
      .bindTooltip(crewName(c)+(c.mph>0?" · "+c.mph+" mph":" · idle"),{direction:"top"});
    pts.push([c.gps.lat,c.gps.lon]);
  });
  if(S.crews.showDist){
    src.forEach(c=>{ const n=nearestOther(c); if(n.crew){
      L.polyline([[c.gps.lat,c.gps.lon],[n.crew.gps.lat,n.crew.gps.lon]],{color:"#1D429B",weight:2,dashArray:"3 7",opacity:.55}).addTo(m)
        .bindTooltip(n.d.toFixed(1)+" mi",{permanent:true,direction:"center",className:"distlbl"});
    }});
  }
  const dr=S.crews.dispatchResult;
  if(dr&&dr.target&&dr.crew){
    L.circleMarker([dr.target.lat,dr.target.lon],{radius:8,color:"#fff",weight:2,fillColor:"#F89B24",fillOpacity:1}).addTo(m).bindTooltip("🎯 "+dr.target.label,{direction:"top"});
    L.polyline([[dr.target.lat,dr.target.lon],[dr.crew.gps.lat,dr.crew.gps.lon]],{color:"#F89B24",weight:3,opacity:.9}).addTo(m);
    pts.push([dr.target.lat,dr.target.lon]);
  }
  if(pts.length>1){ try{ m.fitBounds(pts,{padding:[40,40]}); }catch(e){} }
  setTimeout(function(){ try{m.invalidateSize();}catch(e){} },140);
}
function render(){
  document.documentElement.setAttribute("data-theme",S.theme);

          <div style="font-size:11px;color:#cfe0ff;font-weight:600;text-transform:uppercase;letter-spacing:1px">${t("appTagline")}</div></div>

          <button class="btn3d ghost sm" data-action="toggleLang" style="color:#fff;border-color:#0c1322">🌐 ${t("lang")}</button>
          <button class="btn3d ghost sm" data-action="toggleTheme" style="color:#fff;border-color:#0c1322">${S.theme==="dark"?"☀":"🌙"}</button></div>
      </div></header>
    <nav style="border-bottom:1px solid var(--line);background:var(--bg-2);position:sticky;top:0;z-index:5">

        ${TABS.map(tb=>`<button class="tabbtn ${S.tab===tb.id?'active':''}" data-action="setTab" data-id="${tb.id}">${t(tb.key)}</button>`).join("")}

  if(aeId){const el=document.getElementById(aeId);if(el){el.focus();if(caret!=null&&el.setSelectionRange){try{el.setSelectionRange(caret,caret);}catch(e){}}}}

const getJob=id=>activeJobs().find(j=>j.id===id)||JOBS.find(j=>j.id===id);
document.addEventListener("click",e=>{
  const el=e.target.closest("[data-action]"); if(!el) return;
  const a=el.getAttribute("data-action"), id=el.getAttribute("data-id");
  if(el.tagName==="SELECT"||el.tagName==="OPTION") return;
  switch(a){
    case "attnToggle": S.attnOpen=!S.attnOpen; render(); break;
    case "notifToggle": S.notif.open=!S.notif.open; if(S.notif.open) S.notif.unread=0; render(); break;
    case "notifClose": S.notif.open=false; render(); break;
    case "notifOpen": S.notif.open=false; S.tab="projects"; S.proj.selected=id; S.proj.noteFrom=null; S.proj.stageFilter="all"; loadProjectNotes(id); render(); break;
    case "toggleLang": S.lang=S.lang==="en"?"es":"en"; render(); break;
    case "toggleTheme": S.theme=S.theme==="dark"?"light":"dark"; render(); break;
    case "setTab": S.tab=id; if(id==="itinerary"&&S.live.status==="idle") loadJobs(); if(id==="projects"&&S.proj.status==="idle") loadProjects(); if(id==="weather"&&!S.wx.live) loadWeather(); if(id==="crews"&&S.crews.fleetState!=="live") loadFleet(); if(id==="sitecapture"&&S.sc.scState!=="live") loadSiteCapture(""); if(id==="calendar"&&S.cal.status==="idle") loadOpsCal(); render(); break;
    case "jobsRefresh": loadJobs(); break;
    case "projRefresh": loadProjects(); break;
    case "selectProject": S.proj.selected=id; S.proj.noteFrom=null; loadProjectNotes(id); render(); break;
    case "projStageFocus": S.proj.noteFrom=(id&&S.proj.noteFrom!==id)?id:null; render(); break;
    case "closeProject": S.proj.selected=null; S.proj.noteFrom=null; render(); break;
    case "projStage": S.proj.stageFilter=id; S.proj.selected=null; render(); break;
    case "projClearAlerts": S.proj.alerts=[]; render(); break;
    case "projEnableAlerts": enableAlerts(); break;
    case "scFromProject": { S.tab="sitecapture"; S.sc.showNew=true; S.sc.q=id||""; S.sc.createMsg=""; loadSiteCapture(id||""); render(); break; }
    case "boardFilter": S.boardFilter=(S.boardFilter===id?"all":id); S.selectedJob=null; render(); break;
    case "dayPrev": S.dayOffset--; S.selectedJob=null; render(); break;
    case "dayToday": S.dayOffset=0; S.selectedJob=null; render(); break;
    case "dayNext": S.dayOffset++; S.selectedJob=null; render(); break;
    case "setItinView": S.itinView=id; if(id==="brigada"&&S.cal.status==="idle") loadOpsCal(); render(); break;
    case "calView": S.cal.view=id; if(id==="week"&&!S.cal.weekStartISO) S.cal.weekStartISO=calYMD(calStartOfWeek(new Date())); loadOpsCal(); break;
    case "calPrev": if(S.cal.view==="week"){ const w=new Date((S.cal.weekStartISO||calYMD(calStartOfWeek(new Date())))+"T00:00:00"); S.cal.weekStartISO=calYMD(calAddDays(w,-7)); } else { if(S.cal.m===1){S.cal.m=12;S.cal.y--;}else S.cal.m--; } S.cal.dayPanel=null; loadOpsCal(); break;
    case "calNext": if(S.cal.view==="week"){ const w=new Date((S.cal.weekStartISO||calYMD(calStartOfWeek(new Date())))+"T00:00:00"); S.cal.weekStartISO=calYMD(calAddDays(w,7)); } else { if(S.cal.m===12){S.cal.m=1;S.cal.y++;}else S.cal.m++; } S.cal.dayPanel=null; loadOpsCal(); break;
    case "calType": S.cal.typeFilter=id; render(); break;
    case "calTeam": { const i=S.cal.teamFilter.indexOf(id); if(i>=0)S.cal.teamFilter.splice(i,1); else S.cal.teamFilter.push(id); render(); break; }
    case "calClearTeams": S.cal.teamFilter=[]; render(); break;
    case "calSelectJob": S.cal.selected=id; render(); break;
    case "calDay": S.cal.dayPanel=Number(id); render(); break;
    case "calClose": S.cal.selected=null; S.cal.dayPanel=null; render(); break;
    case "calRefresh": loadOpsCal(); break;
    case "noop": break;
    case "selectJob": S.selectedJob=id; render(); break;
    case "closeJob": S.selectedJob=null; render(); break;
    case "advanceStatus": { const j=getJob(id); const i=STATUS_ORDER.indexOf(j.status); j.status=STATUS_ORDER[Math.min(i+1,3)]; render(); break; }
    case "navigate": { const j=getJob(id); if(!j) break; const u=j.geo?("https://maps.google.com/?q="+j.geo.lat+","+j.geo.lon):("https://maps.google.com/?q="+encodeURIComponent(j.address||j.project||"")); window.open(u,"_blank"); break; }
    case "call": { const j=getJob(id); const ph=(j&&j.phone)||projPhone(id); if(ph) window.open("tel:"+String(ph).replace(/[^0-9+]/g,"")); else alert("No phone on file for this job."); break; }
    case "callCrew": { const c=CREWS.find(x=>x.id===id); if(c) window.open("tel:"+c.phone); break; }
    case "viewProject": S.tab="sitecapture"; S.sc.q=id; render(); break;
    case "crewToggleDist": S.crews.showDist=!S.crews.showDist; render(); break;
    case "crewFit": render(); break;
    case "crewRefresh": { if(S.crews.fleetState==="live"){ loadFleet(); } else { const now=new Date(); CREWS.forEach((c,i)=>{ c.ping=new Date(now.getTime()-i*15000).toLocaleTimeString(); if(c.mph>0){ c.gps={lat:c.gps.lat+(Math.random()-0.5)*0.02,lon:c.gps.lon+(Math.random()-0.5)*0.02}; c.mph=Math.max(15,Math.round(c.mph+(Math.random()-0.5)*10)); } }); render(); } break; }
    case "crewCalc": { const inp=document.getElementById("dispatchTarget"); const raw=(inp?inp.value:"").trim(); const q=raw.toLowerCase(); S.crews.q=raw; let target=null,label=""; if(q){ const job=JOBS.find(j=>j.id.toLowerCase()===q); if(job){ target={lat:job.geo.lat,lon:job.geo.lon}; label=job.id+" · "+job.project; } else { for(const k in FL_CITIES){ if(q.indexOf(k)>=0){ target=FL_CITIES[k]; label=raw; break; } } } } if(target){ let best=null,bd=Infinity; activeSource().forEach(c=>{const d=miles(c.gps,target); if(d<bd){bd=d;best=c;}}); S.crews.dispatchResult={target:{lat:target.lat,lon:target.lon,label:label||raw},crew:best,d:bd}; } else { S.crews.dispatchResult={error:true,q:raw}; } render(); break; }
    case "zohoSync": S.zoho.syncing=true; render(); setTimeout(function(){S.zoho.syncing=false;S.zoho.lastSync=new Date();render();},1300); break;
    case "zohoToggleCode": S.zoho.showCode=!S.zoho.showCode; render(); break;
    case "wxRefresh": loadWeather(); break;
    case "scSelectProject": S.sc.project=id; S.sc.done=false; render(); break;
    case "scLiveSearch": { const inp=document.getElementById("scSearch"); S.sc.q=inp?inp.value:""; loadSiteCapture(S.sc.q.trim()); break; }
    case "scToggleNew": S.sc.showNew=!S.sc.showNew; S.sc.createMsg=""; render(); break;
    case "scOpenDetail": S.sc.detail=id; render(); break;
    case "scCloseDetail": S.sc.detail=null; render(); break;
    case "scCreate": {
      const txt=document.getElementById("scTemplateKey"); const sel=document.getElementById("scTemplate"); const tk=(txt&&txt.value.trim())||(sel&&sel.value)||"";
      if(!tk){ S.sc.createMsg="Pick a template"; render(); break; }
      S.sc.creating=true; S.sc.createMsg=""; render();
      fetch("/api/sitecapture",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({template_key:tk})})
        .then(r=>r.json()).then(j=>{ S.sc.creating=false;
          if(j&&j.ok&&j.id){ S.sc.createMsg=t("sc_createdId")+" #"+j.id; loadSiteCapture(""); }
          else if(j&&j.needsAuth){ S.sc.createMsg="\u26A0 To create in SiteCapture, add SITECAPTURE_USER + SITECAPTURE_PASS in Vercel"; render(); }
          else { S.sc.createMsg="API error: "+((j&&j.error)||"unknown"); render(); } })
        .catch(e=>{ S.sc.creating=false; S.sc.createMsg="API error"; render(); });
      break;
    }
    case "scSetCat": S.sc.cat=id; render(); break;
    case "scAddDemo": S.sc.queue.push({name:"IMG_"+(1000+S.sc.queue.length)+".jpg",size:(1800+S.sc.queue.length*40)+" KB",cat:S.sc.cat}); S.sc.done=false; render(); break;
    case "scRemove": S.sc.queue.splice(Number(id),1); render(); break;
    case "scUpload":
      if(!S.sc.project||S.sc.queue.length===0) return;
      S.sc.uploading=true; S.sc.done=false; render();
      setTimeout(function(){S.sc.uploading=false;S.sc.done=true;S.sc.queue=[];render();},1400); break;
    case "scCreateJob": {
      const nf=S.sc.nf; if(!nf.project.trim()||!nf.address.trim()) return;
      const seq=2000+JOBS.length+Math.floor(Math.random()*900);
      const newId=nf.code+seq;
      const newJob={id:newId,project:nf.project.trim(),code:nf.code,crew:nf.crew,date:nf.date,window:nf.window,
        address:nf.address.trim(),phone:"863-555-0000",geo:{lat:28.03+Math.random()*0.05,lon:-81.80-Math.random()*0.18},status:"scheduled",scope:"New job (created in field)"};
      JOBS.push(newJob);
      PROJECT_HISTORY.unshift({id:newId,customer:nf.project.trim(),address:nf.address.trim(),code:nf.code,photos:0});
      S.sc.created=newId; S.sc.project=newId;
      S.sc.nf={code:"DL",project:"",crew:"crew-morales",date:todayISO,address:"",window:"8:00 AM – 12:00 PM"};
      render(); break;
    }
  }
});

<script>
/* WindMar crew status notifications — polls shared Supabase, alerts the coordinator */
(function(){
  var SB_URL='https://lmlixmzmzpzgeggvywwb.supabase.co';
  var SB_KEY='sb_publishable_M634pSpAHE32sXgQlkYoGQ_prr2qjov';
  var KEY='wm_status_seen';
  var box=document.createElement('div');
  box.style.cssText='position:fixed;top:14px;right:14px;z-index:99999;display:flex;flex-direction:column;gap:8px;max-width:340px;font-family:Montserrat,system-ui,sans-serif';
  document.body.appendChild(box);
  var st=document.createElement('style');st.textContent='@keyframes wmIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}';document.head.appendChild(st);
  function esc(s){return String(s==null?'':s).replace(/[<>&]/g,function(c){return{'<':'&lt;','>':'&gt;','&':'&amp;'}[c];});}
  var COL={'Complete':'#22c55e','Completado':'#22c55e','Concluído':'#22c55e','Inspection Complete':'#06b6d4','Inspección Completa':'#06b6d4','Inspeção Concluída':'#06b6d4','Needs Inspection':'#F89B24','Necesita Inspección':'#F89B24','Precisa Inspeção':'#F89B24','Needs Re-scheduling':'#ef4444','Necesita Reprogramación':'#ef4444','Precisa Reagendar':'#ef4444'};
  function toast(ev){
    var col=COL[ev.status]||'#1D429B';
    var who=[ev.dl_number,ev.customer].filter(Boolean).join(' ')||ev.job_id||'Job';
    var d=document.createElement('div');
    d.style.cssText='background:#122042;color:#f1f5f9;border:1px solid #1D429B55;border-left:4px solid '+col+';border-radius:12px;padding:12px 14px;box-shadow:0 12px 30px -8px rgba(0,0,0,.55);cursor:pointer;animation:wmIn .3s ease-out';
    d.innerHTML='<div style="font-weight:800;font-size:13px;color:'+col+'">🔔 '+esc(ev.status)+'</div><div style="font-size:13px;font-weight:600;margin-top:2px">'+esc(who)+'</div><div style="font-size:11px;color:#A6C3E6;margin-top:2px">'+esc(ev.team||'')+(ev.created_at?' · '+new Date(ev.created_at).toLocaleTimeString():'')+'</div>';
    d.onclick=function(){d.remove();};
    box.appendChild(d);
    setTimeout(function(){d.remove();},14000);
    try{if(typeof Notification!=='undefined'&&Notification.permission==='granted')new Notification('WindMar — '+ev.status,{body:who});}catch(e){}
  }
  function poll(){
    fetch(SB_URL+'/rest/v1/job_status_events?select=*&order=created_at.desc&limit=50',{headers:{apikey:SB_KEY,Authorization:'Bearer '+SB_KEY}})
      .then(function(r){return r.ok?r.json():[];}).then(function(rows){
        if(!Array.isArray(rows))return;
        var prev=window.CREW_FEED||null;
        var changed=!prev||prev.length!==rows.length||((prev[0]&&prev[0].id)!==(rows[0]&&rows[0].id));
        window.CREW_FEED=rows; // feed the "Crew Updates" dashboard column
        var seen;try{seen=JSON.parse(localStorage.getItem(KEY));}catch(e){}
        if(!Array.isArray(seen)){localStorage.setItem(KEY,JSON.stringify(rows.map(function(r){return r.id;})));}
        else{
          var seenSet={};seen.forEach(function(id){seenSet[id]=1;});
          var fresh=rows.filter(function(r){return !seenSet[r.id];});
          if(fresh.length){localStorage.setItem(KEY,JSON.stringify(rows.map(function(r){return r.id;}).concat(seen).slice(0,300)));fresh.reverse().forEach(toast);}
        }
        if(changed&&typeof render==='function'){try{render();}catch(e){}}
      }).catch(function(){});
  }
  poll();setInterval(poll,25000);window.addEventListener('focus',poll);
})();
</script>
